<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator By Aman</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator theme-dark"> 
        
        <div class="top-controls">
            <button id="theme-toggle-btn" class="control-btn" title="Toggle Theme">🌙</button>
            <button id="history-btn" class="control-btn" title="Show History">⏱️</button>
        </div>

        <input type="text" placeholder="0" id="inputBox" readonly> 
        
        <div id="history-container" class="history-hidden">
            <ul id="history-list">
                </ul>
        </div>
        
        <div class="buttons-grid">
            <div>
                <button class="operator">AC</button>
                <button class="operator">DEL</button>
                <button class="operator">%</button>
                <button class="operator">/</button>
            </div>
            <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">*</button>
            </div>
            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>
            </div>
            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>
            </div>
            <div>
                <button>00</button>
                <button>0</button>
                <button>.</button>
                <button class="equalbtn">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
